name = "silcock-dev-stats"
main = "src/index.ts"
compatibility_date = "2026-06-09"

# Serve the API on the existing Cloudflare-proxied domain, so the static
# Cloudflare Pages site can call it same-origin (no CORS). Adjust `zone_name` to
# your actual Cloudflare zone if the apex is registered differently.
routes = [
  { pattern = "drew.silcock.dev/api/*", zone_name = "silcock.dev" }
]

# Daily housekeeping: prune the view-dedup table and (if PAGES_DEPLOY_HOOK is
# set) trigger a Pages rebuild so build-time snapshots refresh once a day.
[triggers]
crons = ["0 4 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "silcock-dev-db"
database_id = "0064f4fb-22fb-46d9-9e72-5045b454b46f"

# Live "reading now" presence. One Durable Object per post tracks open WebSocket
# connections. SQLite-backed so it's available on the Workers free plan.
[[durable_objects.bindings]]
name = "LIVE"
class_name = "LiveCounter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LiveCounter"]

[vars]
# Origins allowed to call the API with CORS (same-origin prod calls don't send
# an Origin header, so they're always fine; this matters for local dev).
ALLOWED_ORIGINS = "https://drew.silcock.dev,http://localhost:4321"

# These are secrets, NOT vars. Set each with `wrangler secret put <NAME>`:
#   SALT               – salt for hashing visitor IPs
#   PAGES_DEPLOY_HOOK  – (optional) Pages Deploy Hook URL; the daily cron POSTs
#                        to it to rebuild the site and refresh build-time data
